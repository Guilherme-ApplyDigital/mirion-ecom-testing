name: Playwright Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare cookie consent storage state
        run: npm run prepare:consent

      # `continue-on-error: true` keeps the workflow green even when individual
      # specs fail — the failures are surfaced via the `playwright-report`
      # artifact and the summary step below, but the badge stays green.
      # Note: `_survey.spec.ts` is a QA tool that dumps DOM/screenshots; it has
      # no assertions and takes ~6 min, so we skip it in CI.
      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        env:
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
          USERNAME_IAP: ${{ secrets.USERNAME_IAP }}
          PASSWORD_IAP: ${{ secrets.PASSWORD_IAP }}
          MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
          MAILSLURP_INBOX_ID: ${{ secrets.MAILSLURP_INBOX_ID }}
          MAILSLURP_INBOX_EMAIL_ADDRESS: ${{ secrets.MAILSLURP_INBOX_EMAIL_ADDRESS }}
          MIRION_LOGIN_EMAIL: ${{ secrets.MIRION_LOGIN_EMAIL }}
          MIRION_BASE_URL: ${{ secrets.MIRION_BASE_URL }}
          NODE_ENV: ''
        run: |
          npx playwright test \
            tests/login.spec.ts \
            tests/regression.spec.ts \
            tests/smoke.spec.ts \
            --project=chromium \
            --reporter=list,html

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Summarize test outcome
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            {
              echo "## Playwright tests reported failures"
              echo ""
              echo "The pipeline is **green by design** (\`continue-on-error: true\`)."
              echo "Download the \`playwright-report\` artifact above to see which tests failed and why."
              echo ""
              echo "If failures need to BLOCK merges, remove \`continue-on-error: true\` from \`.github/workflows/playwright.yml\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Playwright failures::Some tests failed; pipeline is non-blocking by design."
          else
            echo "## All Playwright tests passed" >> "$GITHUB_STEP_SUMMARY"
          fi
